# GitHub Pages configuration
title: OpenClaw Internals Course
description: Interactive course explaining how OpenClaw works under the hood
baseurl: "/openclaw-course"
url: "https://txbot168.github.io"
github_username: txbot168

# Build settings
markdown: kramdown
theme: jekyll-theme-minimal
plugins:
  - jekyll-feed

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/